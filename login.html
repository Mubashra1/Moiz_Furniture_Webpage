<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moiz Sales | Login</title>
  <style>
    /* ---------- GLOBAL STYLES ---------- */
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #1c1c1c, #2f2f2f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      flex-direction: column;
    }

    /* ---------- LOGIN CONTAINER ---------- */
    .login-container {
      background-color: #2b2b2b;
      border-radius: 15px;
      padding: 40px 30px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      width: 350px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
    }

    .login-container h2 {
      margin-bottom: 25px;
      font-size: 28px;
      color: #f2f2f2;
      letter-spacing: 1px;
    }

    /* ---------- INPUT FIELDS ---------- */
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #bbb;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background-color: #3a3a3a;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      background-color: #444;
      box-shadow: 0 0 5px #00bcd4;
    }

    /* ---------- BUTTON ---------- */
    button {
      width: 100%;
      padding: 12px;
      background-color: #00bcd4;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #0097a7;
      box-shadow: 0 0 8px #00bcd4;
    }

    /* ---------- EXTRA LINKS ---------- */
    .extra-links {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }

    .extra-links a {
      color: #00bcd4;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .extra-links a:hover {
      color: #fff;
      text-decoration: underline;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 400px) {
      .login-container {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
     <nav class="navbar navbar-expand-lg bg-body-tertiary" style="background-color:  #2b2b2b;  height: 50px; ;">

    <div class="collapse navbar-collapse" id="navbarNav" style="text-align: justify; justify-content: center; display: flex; gap: 0px ; padding: 10px 0; ">
      
       
          <a class="nav-link active" aria-current="page" href="website.html" style="color: rgb(247, 242, 242);">Products</a>
       
       
          <a class="nav-link" href="home.html" style="color: rgb(245, 240, 240); padding-left: 200px; ">About</a>
        
       
          <a class="nav-link" href="login.html" style="color: rgb(250, 248, 248);padding-left: 200px;">Shop In</a>
       
     
    </div>
  </div>
</nav>
  <div class="login-container">
    <h2>Welcome Back</h2>
    <form>
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit">Login</button>
    </form>

    <div class="extra-links">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don't have an account? <a href="#">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
